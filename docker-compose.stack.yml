# RSS + Clash 统一栈：RSSHub（自建镜像）+ Redis + Clash（clash-aio 构建）+ Subconverter
# 使用前：复制 .env.stack.example 为 .env，填写 CLASH_AIO_PATH、RAW_SUB_URL 及可选 Cookie
# 构建：默认 CLASH_AIO_PATH=./clash-aio（submodule）；可改为 .env 中任意路径

services:
  subconverter:
    image: tindy2013/subconverter:latest
    hostname: subconverter
    container_name: rss-stack-subconverter
    restart: always
    volumes:
      - ${CLASH_AIO_PATH:-./clash-aio}/subconverter/all_base.tpl:/base/base/all_base.tpl
      - ${CLASH_AIO_PATH:-./clash-aio}/subconverter/pref.toml:/base/pref.toml
    ports:
      - "25501:25500"

  clash-with-ui:
    build:
      context: ${CLASH_AIO_PATH:-./clash-aio}
      dockerfile: Dockerfile
    image: clash-with-ui:latest
    container_name: rss-stack-clash-with-ui
    restart: always
    env_file:
      - .env
    environment:
      - RAW_SUB_URL=${RAW_SUB_URL}
    depends_on:
      - subconverter
    # 代理仅内网供 rsshub 使用，不映射到宿主机；若需本机使用代理可取消下一行注释
    # ports:
    #   - "${ALL_PROXY_PORT:-7890}:7890"
    #   - "${CONTROL_PANEL_PORT:-9090}:9090"

  redis:
    image: redis:alpine
    container_name: rss-stack-redis
    restart: always
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s

  rsshub:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 构建时代理，加速拉包；宿主机代理可用 BUILD_PROXY=http://host.docker.internal:7890
        BUILD_PROXY: ${BUILD_PROXY:-}
    image: rsshub:stack
    container_name: rss-stack-rsshub
    restart: always
    ports:
      - "1200:1200"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: "redis://redis:6379/"
      PROXY_PROTOCOL: http
      PROXY_HOST: clash-with-ui
      PROXY_PORT: "7890"
      # 可选：PROXY_URL_REGEX 限定仅匹配的 URL 走代理，默认全部；仅国外示例：(youtube|twitter|telegram|github\.com)
    depends_on:
      redis:
        condition: service_healthy
      clash-with-ui:
        condition: service_started
    # 镜像内无 curl，不配置 healthcheck；脚本 stack-build-and-up.sh 会在宿主机用 curl 验证

volumes:
  redis-data:
